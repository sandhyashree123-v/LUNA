<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LUNA QR Poster</title>
    <style>
      :root {
        --bg: #f4efe5;
        --card: #fffaf0;
        --ink: #1f2a37;
        --muted: #6b7280;
        --accent: #149ad6;
        --accent-soft: #d9f0fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(20, 154, 214, 0.18), transparent 34%),
          radial-gradient(circle at bottom right, rgba(31, 42, 55, 0.1), transparent 32%),
          linear-gradient(135deg, var(--bg), #fbf7ee);
        color: var(--ink);
        font-family: Georgia, "Times New Roman", serif;
      }

      .poster {
        width: min(100%, 860px);
        background: linear-gradient(180deg, rgba(255, 250, 240, 0.98), rgba(255, 255, 255, 0.96));
        border: 1px solid rgba(31, 42, 55, 0.08);
        border-radius: 28px;
        box-shadow: 0 24px 80px rgba(31, 42, 55, 0.14);
        overflow: hidden;
      }

      .hero {
        padding: 36px 36px 24px;
        background:
          linear-gradient(140deg, rgba(20, 154, 214, 0.12), rgba(20, 154, 214, 0.02)),
          linear-gradient(180deg, rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.95));
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--accent);
        font: 600 14px/1.2 system-ui, sans-serif;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(42px, 7vw, 78px);
        line-height: 0.96;
        letter-spacing: -0.04em;
      }

      .sub {
        margin: 16px 0 0;
        max-width: 580px;
        color: var(--muted);
        font: 500 18px/1.6 system-ui, sans-serif;
      }

      .content {
        display: grid;
        grid-template-columns: minmax(220px, 320px) 1fr;
        gap: 28px;
        padding: 28px 36px 36px;
      }

      .qr-wrap {
        display: grid;
        place-items: center;
        padding: 22px;
        border-radius: 24px;
        background: linear-gradient(180deg, #ffffff, var(--accent-soft));
        border: 1px solid rgba(20, 154, 214, 0.14);
      }

      .qr-wrap img {
        width: 100%;
        max-width: 260px;
        height: auto;
        display: block;
        border-radius: 18px;
        background: #fff;
        box-shadow: 0 16px 34px rgba(31, 42, 55, 0.12);
      }

      .info {
        display: grid;
        gap: 18px;
        align-content: center;
      }

      .pill {
        display: inline-flex;
        width: fit-content;
        padding: 9px 14px;
        border-radius: 999px;
        background: rgba(20, 154, 214, 0.12);
        color: #0a6d9a;
        font: 600 14px/1.2 system-ui, sans-serif;
      }

      .url {
        margin: 0;
        word-break: break-word;
        color: var(--ink);
        font: 600 17px/1.6 system-ui, sans-serif;
      }

      .hint {
        margin: 0;
        color: var(--muted);
        font: 500 16px/1.6 system-ui, sans-serif;
      }

      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 6px;
      }

      .actions a,
      .actions button {
        appearance: none;
        border: 0;
        cursor: pointer;
        text-decoration: none;
        padding: 12px 18px;
        border-radius: 999px;
        font: 600 15px/1.2 system-ui, sans-serif;
      }

      .primary {
        background: var(--ink);
        color: #fff;
      }

      .secondary {
        background: rgba(31, 42, 55, 0.08);
        color: var(--ink);
      }

      @media (max-width: 720px) {
        .content {
          grid-template-columns: 1fr;
          padding-top: 10px;
        }
      }

      @media print {
        body {
          background: #fff;
          padding: 0;
        }

        .poster {
          box-shadow: none;
          border: 0;
          border-radius: 0;
          width: 100%;
          max-width: none;
        }

        .actions {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="poster">
      <section class="hero">
        <p class="eyebrow">Scan To Open</p>
        <h1>LUNA</h1>
        <p class="sub">Open the live LUNA companion app instantly from your phone with this QR code.</p>
      </section>

      <section class="content">
        <div class="qr-wrap">
          <img src="/luna-qr.png" alt="QR code for the live LUNA app" />
        </div>

        <div class="info">
          <span class="pill">Live Link</span>
          <p class="url">https://luna-webapp-agfegsegbgb6aven.centralindia-01.azurewebsites.net</p>
          <p class="hint">Works best as a quick share card, a judge-demo poster, or a printed sheet beside your project setup.</p>
          <div class="actions">
            <a class="primary" href="https://luna-webapp-agfegsegbgb6aven.centralindia-01.azurewebsites.net" target="_blank" rel="noreferrer">Open App</a>
            <button class="secondary" type="button" onclick="window.print()">Print Poster</button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
